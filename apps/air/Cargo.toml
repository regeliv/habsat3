[package]
name = "air"
version = "0.1.0"
edition = "2024"

[dependencies]
axum = { version = "0.8.7", features = ["ws"] }
tokio = { version = "1.48", features = ["full"] }
tower-http = { version = "0.6", features = ["fs"] }
chrono = { version = "0.4", features = ["serde"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
kanal = "0.1.1"
uom = "0.37.0"
i2cdev = "0.6.2"
tracing = "0.1.44"
tracing-subscriber = "0.3.22"
futures = "0.3.31"

bno-055 = { path = "../../platform/bno-055/" }
system-sensors = { path = "../../platform/system-sensors/" }
